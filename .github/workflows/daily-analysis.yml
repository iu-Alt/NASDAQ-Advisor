name: Daily NASDAQ-100 Analysis

on:
  schedule:
    # 美股收盘后约 30 分钟 (美东 16:30 = UTC 21:30, 夏令时)
    # 北京时间次日 05:30
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main
    paths-ignore:
      - 'output/**'
      - 'data/**'
      - 'README.md'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Create required directories
        run: |
          mkdir -p data output

      - name: Run analysis
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
          GITHUB_PAGES_URL: https://iu-Alt.github.io/NASDAQ-Advisor/
        run: python src/main.py

      - name: Commit and push data updates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/*.csv output/index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[bot] Daily update $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
          commit_message: "Deploy: $(date +'%Y-%m-%d')"
